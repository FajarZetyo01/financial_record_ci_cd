<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow: hidden;
            background: #020617;
            position: relative;
        }

        /* =========================
           ANIMATED BACKGROUND
        ========================= */

        .background {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 1;
        }

        .gradient {
            position: absolute;
            width: 650px;
            height: 650px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.45;
            animation: move 18s infinite alternate ease-in-out;
        }

        .gradient1 {
            background: #2563eb;
            top: -200px;
            left: -120px;
        }

        .gradient2 {
            background: #7c3aed;
            bottom: -250px;
            right: -100px;
            animation-delay: 3s;
        }

        .gradient3 {
            background: #06b6d4;
            top: 35%;
            left: 35%;
            animation-delay: 6s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(80px, -40px) scale(1.15);
            }
        }

        /* Floating particles */

        .particles span {
            position: absolute;
            display: block;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .particles span:nth-child(1) {
            left: 10%;
            width: 8px;
            height: 8px;
            animation-duration: 12s;
        }

        .particles span:nth-child(2) {
            left: 20%;
            width: 12px;
            height: 12px;
            animation-duration: 18s;
        }

        .particles span:nth-child(3) {
            left: 35%;
            width: 14px;
            height: 14px;
            animation-duration: 20s;
        }

        .particles span:nth-child(4) {
            left: 50%;
            width: 10px;
            height: 10px;
            animation-duration: 15s;
        }

        .particles span:nth-child(5) {
            left: 65%;
            width: 16px;
            height: 16px;
            animation-duration: 22s;
        }

        .particles span:nth-child(6) {
            left: 80%;
            width: 9px;
            height: 9px;
            animation-duration: 17s;
        }

        .particles span:nth-child(7) {
            left: 92%;
            width: 18px;
            height: 18px;
            animation-duration: 25s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(720deg);
                opacity: 0;
            }
        }

        /* =========================
           REGISTER WRAPPER
        ========================= */

        .register-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        /* =========================
           CARD
        ========================= */

        .register-card {
            width: 100%;
            max-width: 420px;

            padding: 2rem;

            border-radius: 24px;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(18px);

            border: 1px solid rgba(255, 255, 255, 0.1);

            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);

            color: white;

            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* =========================
           LOGO
        ========================= */

        .brand-logo {
            width: 60px;
            height: 60px;

            margin: auto auto 16px auto;

            border-radius: 18px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 22px;
            font-weight: 700;

            background: linear-gradient(135deg, #2563eb, #7c3aed);

            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
        }

        /* =========================
           TEXT
        ========================= */

        .register-title {
            font-size: 24px;
            font-weight: 700;
        }

        .register-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* =========================
           FORM
        ========================= */

        .form-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;

            color: rgba(255, 255, 255, 0.85);
        }

        .form-control {
            width: 100%;

            min-height: 42px;

            padding: 10px 14px;

            border-radius: 12px;

            border: none;

            background: rgba(255, 255, 255, 0.08);

            color: white;

            font-size: 14px;

            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);

            color: white;

            border: 1px solid #3b82f6;

            box-shadow: 0 0 0 0.15rem rgba(59, 130, 246, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        /* =========================
           BUTTON
        ========================= */

        .btn-register {
            width: 100%;

            min-height: 42px;

            border-radius: 12px;

            border: none;

            font-size: 14px;
            font-weight: 600;

            background: linear-gradient(135deg, #2563eb, #7c3aed);

            transition: all 0.3s ease;
        }

        .btn-register:hover {
            transform: translateY(-2px);

            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
        }

        /* =========================
           FOOTER
        ========================= */

        .bottom-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
        }

        .bottom-text a {
            text-decoration: none;
            font-weight: 600;
            color: #93c5fd;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }

        /* =========================
           VALIDATION
        ========================= */

        .invalid-feedback {
            display: block;
            font-size: 12px;
            color: #fca5a5;
        }

        /* =========================
           MOBILE
        ========================= */

        @media (max-width: 576px) {

            .register-card {
                padding: 1.5rem;
                border-radius: 20px;
            }

            .register-title {
                font-size: 22px;
            }

            .register-subtitle {
                font-size: 13px;
            }

            .form-control {
                font-size: 13px;
                padding: 9px 12px;
            }

            .btn-register {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<!-- Animated Background -->
<div class="background">

    <div class="gradient gradient1"></div>
    <div class="gradient gradient2"></div>
    <div class="gradient gradient3"></div>

    <div class="particles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<!-- Register -->
<div class="container register-wrapper d-flex align-items-center justify-content-center">

    <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

        <div class="register-card">

            <div class="text-center mb-4">

                <div class="brand-logo">
                    FR
                </div>

                <h1 class="register-title mb-1">
                    Create Account
                </h1>

                <p class="register-subtitle mb-0">
                    Register untuk membuat akun baru
                </p>

            </div>

            {{ if .error }}
            <div class="alert alert-danger">
                {{ .error }}
            </div>
            {{ end }}

            {{ if .success }}
            <div class="alert alert-success">
                {{ .success }}
            </div>
            {{ end }}

            <form action="/register" method="POST">

                <div class="mb-3">
                    <label class="form-label">
                        Full Name
                    </label>

                    <input type="text"
                           class="form-control {{ if .validation.Name }} is-invalid {{ end }}"
                           name="name"
                           value="{{ .register.Name }}"
                           placeholder="Enter your full name">

                    <div class="invalid-feedback">
                        {{ .validation.Name }}
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           class="form-control {{ if .validation.Email }} is-invalid {{ end }}"
                           name="email"
                           value="{{ .register.Email }}"
                           placeholder="Enter your email">

                    <div class="invalid-feedback">
                        {{ .validation.Email }}
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        Password
                    </label>

                    <input type="password"
                           class="form-control {{ if .validation.Password }} is-invalid {{ end }}"
                           name="password"
                           value="{{ .register.Password }}"
                           placeholder="Enter your password">

                    <div class="invalid-feedback">
                        {{ .validation.Password }}
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        Confirm Password
                    </label>

                    <input type="password"
                           class="form-control {{ if .validation.ConfirmPassword }} is-invalid {{ end }}"
                           name="confirm_password"
                           value="{{ .register.ConfirmPassword }}"
                           placeholder="Confirm your password">

                    <div class="invalid-feedback">
                        {{ .validation.ConfirmPassword }}
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-register">
                    Register
                </button>

            </form>

            <div class="text-center mt-4 bottom-text">
                Sudah punya akun?
                <a href="/login">
                    Login sekarang
                </a>
            </div>

        </div>

    </div>

</div>

</body>

</html>
