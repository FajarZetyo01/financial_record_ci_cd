<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Form</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            overflow: hidden;
            min-height: 100vh;
            background: #020617;
            position: relative;
        }

        /* Animated Gradient Background */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .gradient {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: move 15s infinite alternate ease-in-out;
        }

        .gradient1 {
            background: #2563eb;
            top: -200px;
            left: -100px;
        }

        .gradient2 {
            background: #7c3aed;
            bottom: -200px;
            right: -100px;
            animation-delay: 3s;
        }

        .gradient3 {
            background: #06b6d4;
            top: 40%;
            left: 35%;
            animation-delay: 6s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(80px, -50px) scale(1.2);
            }
        }

        /* Floating particles */
        .particles span {
            position: absolute;
            display: block;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 50%;
            animation: float 20s linear infinite;
            bottom: -150px;
        }

        .particles span:nth-child(1) {
            left: 10%;
            width: 8px;
            height: 8px;
            animation-duration: 12s;
        }

        .particles span:nth-child(2) {
            left: 20%;
            animation-duration: 18s;
        }

        .particles span:nth-child(3) {
            left: 35%;
            width: 15px;
            height: 15px;
            animation-duration: 20s;
        }

        .particles span:nth-child(4) {
            left: 50%;
            animation-duration: 16s;
        }

        .particles span:nth-child(5) {
            left: 65%;
            width: 10px;
            height: 10px;
            animation-duration: 22s;
        }

        .particles span:nth-child(6) {
            left: 80%;
            animation-duration: 14s;
        }

        .particles span:nth-child(7) {
            left: 90%;
            width: 18px;
            height: 18px;
            animation-duration: 24s;
        }

        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            100% {
                transform: translateY(-1200px) rotate(720deg);
                opacity: 0;
            }
        }

        /* Login Container */
        .login-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .brand-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 24px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.5);
        }

        .login-title {
            font-size: 30px;
            font-weight: 700;
        }

        .login-subtitle {
            color: rgba(255, 255, 255, 0.7);
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
        }

        .form-control {
            height: 54px;
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            transition: 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            border: 1px solid #3b82f6;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.25);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        .btn-login {
            height: 54px;
            border-radius: 16px;
            font-weight: 600;
            border: none;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            opacity: 0.95;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.35);
        }

        .bottom-text {
            color: rgba(255, 255, 255, 0.7);
        }

        .bottom-text a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }

        .invalid-feedback {
            display: block;
            color: #fca5a5;
        }
    </style>
</head>

<body>

<!-- Animated Background -->
<div class="background">
    <div class="gradient gradient1"></div>
    <div class="gradient gradient2"></div>
    <div class="gradient gradient3"></div>

    <div class="particles">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<!-- Login -->
<div class="container login-wrapper d-flex align-items-center justify-content-center">

    <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

        <div class="login-card p-4 p-md-5">

            <div class="text-center mb-4">

                <div class="brand-logo">
                    FR
                </div>

                <h1 class="login-title mb-2">
                    Login Form
                </h1>

                <p class="login-subtitle">
                    Login untuk melanjutkan ke dashboard
                </p>

            </div>

            {{ if .error }}
            <div class="alert alert-danger">
                {{ .error }}
            </div>
            {{ end }}

            {{ if .success }}
            <div class="alert alert-success">
                {{ .success }}
            </div>
            {{ end }}

            <form action="/login" method="POST">

                <div class="mb-3">
                    <label for="email" class="form-label">
                        Email Address
                    </label>

                    <input type="email"
                           class="form-control {{ if .validation.Email }} is-invalid {{ end }}"
                           id="email"
                           name="email"
                           value="{{ .login.Email }}"
                           placeholder="Enter your email" />

                    <div class="invalid-feedback">
                        {{ .validation.Email }}
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">
                        Password
                    </label>

                    <input type="password"
                           class="form-control {{ if .validation.Password }} is-invalid {{ end }}"
                           id="password"
                           name="password"
                           placeholder="Enter your password" />

                    <div class="invalid-feedback">
                        {{ .validation.Password }}
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    Login
                </button>

            </form>

            <div class="text-center mt-4 bottom-text">
                Belum punya akun?
                <a href="/register">
                    Daftar sekarang
                </a>
            </div>

        </div>

    </div>

</div>

</body>

</html>
