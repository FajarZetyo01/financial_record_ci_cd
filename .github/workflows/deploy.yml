name: Deploy Golang App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod tidy

      - name: Build app
        run: |
          go build -o app

      - name: Copy binary to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "app,views,public"
          target: "/home/aplikasi_financial_record/financial_record_ci_cd"

      - name: Restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            chmod +x /home/aplikasi_financial_record/financial_record_ci_cd/app
            sudo systemctl restart financial_record_ci_cd
            sudo systemctl status financial_record_ci_cd --no-pager
